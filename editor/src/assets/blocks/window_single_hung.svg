<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1">
  <!-- Single-hung: bottom sash glass solid, top sash glass dashed (fixed). -->
  <rect x="0" y="0" width="1" height="1" fill="#4a90d9" fill-opacity="0.1" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="0.25" x2="1" y2="0.25" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="0.04 0.03" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="0.5"  x2="1" y2="0.5"  stroke="#4a90d9" stroke-width="2"   vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="0.75" x2="1" y2="0.75" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
</svg>
