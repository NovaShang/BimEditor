<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1">
  <!-- Sliding: two glass lines + center divider + horizontal arrow. -->
  <rect x="0" y="0" width="1" height="1" fill="#4a90d9" fill-opacity="0.1" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="0.35" x2="1" y2="0.35" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="0.65" x2="1" y2="0.65" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <line x1="0.5" y1="0" x2="0.5" y2="1" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <line x1="0.3" y1="0.5" x2="0.7" y2="0.5" stroke="#4a90d9" stroke-width="2" vector-effect="non-scaling-stroke"/>
  <line x1="0.7" y1="0.5" x2="0.62" y2="0.35" stroke="#4a90d9" stroke-width="2" vector-effect="non-scaling-stroke"/>
  <line x1="0.7" y1="0.5" x2="0.62" y2="0.65" stroke="#4a90d9" stroke-width="2" vector-effect="non-scaling-stroke"/>
</svg>
