<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1">
  <!-- Awning: top-hinge, opens outward. V symbol with apex pointing down/out. -->
  <rect x="0" y="0" width="1" height="1" fill="#4a90d9" fill-opacity="0.1" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="0" x2="0.5" y2="1" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <line x1="1" y1="0" x2="0.5" y2="1" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
</svg>
