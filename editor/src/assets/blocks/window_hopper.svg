<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1 1">
  <!-- Hopper: bottom-hinge, opens inward. Inverted V with apex pointing up. -->
  <rect x="0" y="0" width="1" height="1" fill="#4a90d9" fill-opacity="0.1" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="1" x2="0.5" y2="0" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
  <line x1="1" y1="1" x2="0.5" y2="0" stroke="#4a90d9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>
</svg>
